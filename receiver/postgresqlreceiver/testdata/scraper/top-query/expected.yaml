                value:
                  doubleValue: 3
              - key: postgresql.min_exec_time
                value:
                  doubleValue: 1
              - key: postgresql.mean_exec_time
                value:
                  doubleValue: 2
              - key: postgresql.max_plan_time
                value:
                  doubleValue: 6
              - key: postgresql.min_plan_time
                value:
                  doubleValue: 4
              - key: postgresql.mean_plan_time
                value:
                  doubleValue: 5
              - key: postgresql.queryid 
                value: 
                  stringValue: "114514"
              - key: postgresql.rolname 
                value: 
                  stringValue: master
              - key: postgresql.total_exec_time 
                value: 
                  doubleValue: 1
              - key: postgresql.total_plan_time 
                value: 
                  doubleValue: 1
